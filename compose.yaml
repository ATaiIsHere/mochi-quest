services:
  mochi-quest:
    build:
      context: .
    image: mochi-quest:local
    container_name: mochi-quest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3030}
      MOCHI_QUEST_DB: /data/data.db
      MOCHI_QUEST_WEB_DIST: /app/packages/web/dist
    volumes:
      - mochi_quest_data:/data
    ports:
      - "${HOST:-127.0.0.1}:${PORT:-3030}:${PORT:-3030}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:${PORT:-3030}/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mochi_quest_data:
